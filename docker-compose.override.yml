# NexusLog default local override
# Auto-loaded by `docker compose up -d`.
# Development hot-reload settings live here directly.

services:
  frontend-console:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/node:20-bullseye
    working_dir: /workspace
    command:
      - /bin/bash
      - -lc
      - |
        corepack enable
        pnpm install --frozen-lockfile
        pnpm --dir apps/frontend-console dev --host 0.0.0.0 --port 3000
    ports: !override
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
    cpus: "0.75"
    mem_limit: "768m"

  bff-service:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/node:20-bullseye
    working_dir: /workspace
    command:
      - /bin/bash
      - -lc
      - |
        cd apps/bff-service
        npm install
        npm run start:dev
    volumes:
      - ./:/workspace
      - bff-node-modules:/workspace/apps/bff-service/node_modules
    cpus: "0.50"
    mem_limit: "512m"

  control-plane:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/control-plane
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/control-plane ./cmd/api" --build.bin "/tmp/control-plane" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.75"
    mem_limit: "768m"

  api-service:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/api-service
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/api-service ./cmd/api" --build.bin "/tmp/api-service" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.75"
    mem_limit: "768m"

  query-api:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/data-services/query-api
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/query-api ./cmd/api" --build.bin "/tmp/query-api" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.75"
    mem_limit: "768m"

  audit-api:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/data-services/audit-api
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/audit-api ./cmd/api" --build.bin "/tmp/audit-api" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.75"
    mem_limit: "768m"

  export-api:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/data-services/export-api
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/export-api ./cmd/api" --build.bin "/tmp/export-api" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.75"
    mem_limit: "768m"

  health-worker:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/health-worker
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/health-worker ./cmd/worker" --build.bin "/tmp/health-worker" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.50"
    mem_limit: "512m"

  collector-agent:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/agents/collector-agent
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/collector-agent ./cmd/agent" --build.bin "/tmp/collector-agent" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    environment:
      - HTTP_PORT=9091
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=nexuslog-raw-logs
      - CHECKPOINT_DIR=/var/lib/collector-agent/checkpoints
      - CACHE_DIR=/var/lib/collector-agent/cache
      - CONFIG_PATH=/workspace/agents/collector-agent/configs/agent.yaml
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    ports:
      - "9091:9091"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - collector-agent-data:/var/lib/collector-agent
    cpus: "0.75"
    mem_limit: "768m"

  postgres:
    cpus: "1.00"
    mem_limit: "1g"

  redis:
    cpus: "0.50"
    mem_limit: "512m"

  elasticsearch:
    cpus: "1.50"
    mem_limit: "1536m"
    environment:
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  zookeeper:
    cpus: "0.50"
    mem_limit: "512m"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ZOOKEEPER_HEAP_OPTS=-Xms256m -Xmx256m

  kafka:
    cpus: "1.00"
    mem_limit: "1g"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_HEAP_OPTS=-Xms512m -Xmx512m

volumes:
  pnpm-store:
  bff-node-modules:
  go-pkg-mod:
  go-build-cache:
  collector-agent-data:
