# NexusLog default local override
# Auto-loaded by `  `.
# Development hot-reload settings live here directly.

services:
  frontend-console:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/node:20-bullseye
    working_dir: /workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -e
        corepack enable
        corepack prepare pnpm@9.15.0 --activate
        if [ ! -d apps/frontend-console/node_modules ] || [ ! -d node_modules/.pnpm ]; then
          pnpm install --frozen-lockfile --filter @nexuslog/frontend-console...
        fi
        pnpm --dir apps/frontend-console dev --host 0.0.0.0 --port 3000 --strictPort
    ports: !override
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - COREPACK_NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmmirror.com}
      - NPM_CONFIG_REGISTRY=${NPM_REGISTRY:-https://registry.npmmirror.com}
      # Vite 运行在容器内时，代理目标需要指向容器网络中的 api-service
      - VITE_DEV_API_PROXY_TARGET=http://api-service:8080
      # ingest 接口走 control-plane，避免被 api-service 兜底转发
      - VITE_DEV_INGEST_PROXY_TARGET=http://control-plane:8080
      # query 接口走 query-api，避免被 api-service 兜底转发
      - VITE_DEV_QUERY_PROXY_TARGET=http://query-api:8082
      # audit 接口走 audit-api
      - VITE_DEV_AUDIT_PROXY_TARGET=http://audit-api:8083
      # export 接口走 export-api
      - VITE_DEV_EXPORT_PROXY_TARGET=http://export-api:8084
      # agent 拉取接口走 collector-agent
      - VITE_DEV_AGENT_PROXY_TARGET=http://collector-agent:9091
      - VITE_DEV_WS_PROXY_TARGET=ws://api-service:8080
    volumes:
      - ./:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
    cpus: "0.75"
    mem_limit: "768m"

  bff-service:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/node:20-bullseye
    working_dir: /workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -e
        corepack enable
        corepack prepare pnpm@9.15.0 --activate
        if [ ! -d apps/bff-service/node_modules ] || [ ! -d node_modules/.pnpm ]; then
          pnpm install --frozen-lockfile --filter @nexuslog/bff-service...
        fi
        pnpm --dir apps/bff-service start:dev
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - COREPACK_NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmmirror.com}
      - NPM_CONFIG_REGISTRY=${NPM_REGISTRY:-https://registry.npmmirror.com}
    volumes:
      - ./:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
    cpus: "0.50"
    mem_limit: "512m"

  control-plane:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/control-plane
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/control-plane ./cmd/api" --build.bin "/tmp/control-plane" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://goproxy.cn,direct}
      - GOSUMDB=off
      - LEGACY_LOG_PIPELINE_ENABLED=false
      - ALERT_EVALUATOR_ENABLED=true
      - ALERT_EVALUATOR_INTERVAL=15s
      - ALERT_EVALUATOR_ES_INDEX=nexuslog-logs-read
      - INGEST_ES_INDEX=nexuslog-logs-write-pull
      - INGEST_DEFAULT_AGENT_KEY=nexuslog-local-dev-agent-key-20260314-change-before-production
      # ingest 执行链路在容器内需要直连 ES 服务名，不能使用 localhost
      - INGEST_ES_ENDPOINT=http://elasticsearch:9200
      - ALERTMANAGER_BRIDGE_ENABLED=true
      - ALERTMANAGER_BRIDGE_INTERVAL=10s
      - ALERTMANAGER_URL=http://alertmanager:9093
      - ALERTMANAGER_GENERATOR_URL=http://localhost:8080
      # 关键日志源使用更短轮询间隔（命中 source_id/name/path 中以下模式即触发）
      - INGEST_CRITICAL_SOURCE_PATTERNS=critical,security,audit,secure
      - INGEST_CRITICAL_PULL_INTERVAL_SEC=2
      # 端到端拉取延迟窗口统计与告警阈值
      - INGEST_LATENCY_WINDOW_SIZE=300
      - INGEST_LATENCY_ALERT_P95_MS=3000
      - INGEST_LATENCY_ALERT_P99_MS=5000
      - INGEST_LATENCY_ALERT_COOLDOWN_SEC=60
    cpus: "0.75"
    mem_limit: "768m"

  api-service:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/api-service
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/api-service ./cmd/api" --build.bin "/tmp/api-service" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.75"
    mem_limit: "768m"

  query-api:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/data-services/query-api
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/query-api ./cmd/api" --build.bin "/tmp/query-api" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - /var/lib/docker/containers:/host-docker-containers:ro
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://goproxy.cn,direct}
      - GOSUMDB=off
      - LEGACY_LOG_PIPELINE_ENABLED=false
      - QUERY_LOGS_INDEX=nexuslog-logs-read
      - QUERY_DOCKER_CONTAINERS_ROOT=/host-docker-containers
    cpus: "0.75"
    mem_limit: "768m"

  audit-api:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/data-services/audit-api
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/audit-api ./cmd/api" --build.bin "/tmp/audit-api" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.75"
    mem_limit: "768m"

  export-api:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/data-services/export-api
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/export-api ./cmd/api" --build.bin "/tmp/export-api" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.75"
    mem_limit: "768m"

  health-worker:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/services/health-worker
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/health-worker ./cmd/worker" --build.bin "/tmp/health-worker" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - GOMAXPROCS=2
      - GOMEMLIMIT=512MiB
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    cpus: "0.50"
    mem_limit: "512m"

  collector-agent:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    user: root
    working_dir: /workspace/agents/collector-agent
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/collector-agent ./cmd/agent" --build.bin "/tmp/collector-agent" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    environment:
      - HTTP_PORT=9091
      - LEGACY_LOG_PIPELINE_ENABLED=false
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=nexuslog.logs.raw
      - KAFKA_SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - KAFKA_SCHEMA_SUBJECT=nexuslog.logs.raw-value
      - KAFKA_SCHEMA_FILE=/workspace/stream/flink/contracts/local/log-raw.avsc
      - KAFKA_REQUIRED_ACKS=all
      - DELIVERY_MODE=dual
      - ENABLE_KAFKA_PIPELINE=true
      - CHECKPOINT_DIR=/var/lib/collector-agent/checkpoints
      - CACHE_DIR=/var/lib/collector-agent/cache
      - AGENT_SOURCE_HOSTNAME_FILE=/host/etc/nexuslog-host-meta/source_hostname
      - AGENT_SOURCE_IP_FILE=/host/etc/nexuslog-host-meta/source_ip
      - AGENT_SOURCE_IP_DISCOVERY=primary_ipv4
      - AGENT_SOURCE_IP_ALLOW_CONTAINER_FALLBACK=false
      - PULLV2_ENABLE_RECORD_BUFFERING=false
      - COLLECTOR_INCLUDE_PATHS=/var/log/*.log,/var/log/messages,/var/log/secure,/var/log/cron,/var/log/maillog,/var/log/spooler,/var/log/boot.log,/var/log/command_audit.log,/var/log/kdump.log,/var/log/*/*.log,/var/log/*/*_log,/host-docker-containers/*/*-json.log
      - COLLECTOR_CRITICAL_INCLUDE_PATHS=/var/log/messages,/var/log/secure,/var/log/cron,/var/log/maillog,/var/log/spooler
      - COLLECTOR_EXCLUDE_PATHS=/var/log/*.gz,/var/log/*/*.gz,/var/log/*.xz,/var/log/*/*.xz,/var/log/journal/*,/var/log/lastlog,/var/log/wtmp,/var/log/wtmp-*,/var/log/btmp,/var/log/btmp-*
      - COLLECTOR_CRITICAL_KEYWORDS=critical,fatal,panic,error,alert,security,unauthorized,denied
      - 'COLLECTOR_PATH_LABEL_RULES=[{"pattern":"/var/log/*","labels":{"env":"local","log_scope":"service","source_type":"host-log"}},{"pattern":"/var/log/*/*.log","labels":{"env":"local","log_scope":"service","source_type":"host-log"}},{"pattern":"/host-docker-containers/*/*-json.log","labels":{"env":"local","log_scope":"container","source_type":"docker-json"}}]'
      - COLLECTOR_FLUSH_INTERVAL=5s
      - COLLECTOR_CRITICAL_FLUSH_INTERVAL=500ms
      - COLLECTOR_PER_FILE_READ_LIMIT=200
      - COLLECTOR_ENABLE_FSNOTIFY=true
      - COLLECTOR_EVENT_DEBOUNCE=200ms
      - CONFIG_PATH=/workspace/agents/collector-agent/configs/agent.yaml
      - GOPROXY=${GOPROXY:-https://goproxy.cn,direct}
      - GOSUMDB=off
    ports:
      - "9091:9091"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - ./.runtime/host-meta:/host/etc/nexuslog-host-meta:ro
      - /etc/hostname:/host/etc/hostname:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/host-docker-containers:ro
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - collector-agent-data:/var/lib/collector-agent
    networks:
      - nexuslog-net
    cpus: "0.75"
    mem_limit: "768m"

  # 本地模拟远程服务器部署的 Agent（用于日志存储与拉取联调）
  collector-agent-remote:
    build: !reset null
    image: ${MIRROR_DOCKER_HUB}/golang:1.23-bullseye
    working_dir: /workspace/agents/collector-agent
    command:
      - /bin/bash
      - -c
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        command -v air >/dev/null 2>&1 || go install github.com/air-verse/air@v1.52.3
        air --build.cmd "go build -buildvcs=false -o /tmp/collector-agent-remote ./cmd/agent" --build.bin "/tmp/collector-agent-remote" --build.delay "1000" --build.exclude_dir "tmp,vendor,.git,node_modules"
    environment:
      # 按需求使用 16666 暴露“远程日志记录/拉取”端口
      - HTTP_PORT=16666
      - LEGACY_LOG_PIPELINE_ENABLED=false
      - AGENT_ID=collector-agent-remote-local
      - AGENT_SOURCE_HOSTNAME=collector-agent-remote-local
      - AGENT_SOURCE_IP=198.18.0.2
      - AGENT_SOURCE_IP_ALLOW_CONTAINER_FALLBACK=false
      - PULLV2_ENABLE_RECORD_BUFFERING=false
      - AGENT_API_KEY_ACTIVE_ID=active
      - AGENT_API_KEY_ACTIVE=nexuslog-local-dev-agent-key-20260314-change-before-production
      # 远程模拟模式仅保留 pull 主路径，关闭 Kafka 兼容主推
      - ENABLE_KAFKA_PIPELINE=false
      # 独立的状态与日志路径，避免与本地主 agent 混用
      - CHECKPOINT_DIR=/var/lib/collector-agent-remote/checkpoints
      - CACHE_DIR=/var/lib/collector-agent-remote/cache
      # 采集“远程模拟日志 + 宿主机服务日志 + 容器日志”
      - COLLECTOR_INCLUDE_PATHS=/var/log/remote/*.log,/host-var-log/*.log,/host-var-log/messages,/host-var-log/secure,/host-var-log/syslog,/host-var-log/*/*.log,/host-docker-containers/*/*-json.log
      # 对关键日志路径使用更快扫描策略，降低告警日志入链路延迟
      - COLLECTOR_CRITICAL_INCLUDE_PATHS=/host-var-log/messages,/host-var-log/secure
      - COLLECTOR_FLUSH_INTERVAL=5s
      - COLLECTOR_CRITICAL_FLUSH_INTERVAL=500ms
      - COLLECTOR_PER_FILE_READ_LIMIT=200
      - COLLECTOR_ENABLE_FSNOTIFY=true
      - COLLECTOR_EVENT_DEBOUNCE=200ms
      - COLLECTOR_CRITICAL_KEYWORDS=critical,fatal,panic,error,alert,security,unauthorized,denied
      - 'COLLECTOR_PATH_LABEL_RULES=[{"pattern":"/var/log/remote/*.log","labels":{"env":"local","channel":"remote-sim","log_scope":"sandbox"}},{"pattern":"/host-var-log/*","labels":{"env":"local","log_scope":"service","source_type":"host-log"}},{"pattern":"/host-var-log/*/*.log","labels":{"env":"local","log_scope":"service","source_type":"host-log"}},{"pattern":"/host-docker-containers/*/*-json.log","labels":{"env":"local","log_scope":"container","source_type":"docker-json"}}]'
      - COLLECTOR_EXCLUDE_PATHS=/host-var-log/*.gz,/host-var-log/*/*.gz,/host-var-log/*.xz,/host-var-log/*/*.xz,/host-var-log/journal/*
      - CONFIG_PATH=/workspace/agents/collector-agent/configs/agent.yaml
      - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
      - GOSUMDB=off
    ports:
      - "16666:16666"
    volumes:
      - ./:/workspace
      - go-pkg-mod:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - collector-agent-remote-data:/var/lib/collector-agent-remote
      - collector-agent-remote-logs:/var/log/remote
      - /var/log:/host-var-log:ro
      - /var/lib/docker/containers:/host-docker-containers:ro
    networks:
      - nexuslog-net
    cpus: "0.75"
    mem_limit: "768m"

  postgres:
    cpus: "1.00"
    mem_limit: "1g"

  redis:
    cpus: "0.50"
    mem_limit: "512m"

  elasticsearch:
    cpus: "2.00"
    mem_limit: "2048m"
    environment:
      - xpack.ml.enabled=false
      - ingest.geoip.downloader.enabled=false
      - path.repo=/usr/share/elasticsearch/snapshots
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - ./storage/elasticsearch/snapshots:/usr/share/elasticsearch/snapshots

  zookeeper:
    cpus: "0.50"
    mem_limit: "512m"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ZOOKEEPER_HEAP_OPTS=-Xms256m -Xmx256m

  kafka:
    cpus: "1.00"
    mem_limit: "1g"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_HEAP_OPTS=-Xms512m -Xmx512m

  es-compat-proxy:
    image: ${MIRROR_DOCKER_HUB}/nginx:1.25-alpine
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./observability/es-compat-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9200/_cluster/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - nexuslog-net

  flink-jobmanager:
    volumes:
      - ./stream/flink/jobs:/opt/flink/jobs
      - ./stream/flink/configs:/opt/flink/conf-custom
      - ./stream/flink/udf:/opt/flink/udf

  flink-taskmanager:
    volumes:
      - ./stream/flink/jobs:/opt/flink/jobs
      - ./stream/flink/configs:/opt/flink/conf-custom
      - ./stream/flink/udf:/opt/flink/udf

  flink-sql-init:
    volumes:
      - ./stream/flink/jobs:/opt/flink/jobs
      - ./stream/flink/configs:/opt/flink/conf-custom
      - ./stream/flink/udf:/opt/flink/udf

volumes:
  pnpm-store:
  go-pkg-mod:
  go-build-cache:
  collector-agent-data:
  collector-agent-remote-data:
  collector-agent-remote-logs:
