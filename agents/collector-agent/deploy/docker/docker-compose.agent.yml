services:
  collector-agent:
    image: nexuslog/collector-agent:latest
    container_name: nexuslog-collector-agent
    restart: unless-stopped
    ports:
      - "9091:9091"
    environment:
      HTTP_PORT: "9091"
      AGENT_ID: "collector-agent-docker"
      AGENT_VERSION: "0.1.1"
      AGENT_API_KEY_ACTIVE_ID: "active"
      AGENT_API_KEY_ACTIVE: "replace-with-strong-key"
      AGENT_API_KEY_NEXT_ID: "next"
      AGENT_API_KEY_NEXT: ""
      COLLECTOR_INCLUDE_PATHS: "/var/log/*.log,/var/log/messages,/var/log/secure,/var/log/cron,/var/log/maillog,/var/log/spooler,/var/log/boot.log,/var/log/command_audit.log,/var/log/kdump.log,/var/log/*/*.log,/var/log/*/*_log"
      COLLECTOR_CRITICAL_INCLUDE_PATHS: "/var/log/messages,/var/log/secure,/var/log/cron,/var/log/maillog,/var/log/spooler"
      COLLECTOR_EXCLUDE_PATHS: "/var/log/wtmp,/var/log/btmp"
      COLLECTOR_PATH_LABEL_RULES: '[{"pattern":"/var/log/nginx/*.log","labels":{"service":"nginx","env":"prod"}}]'
      COLLECTOR_SYSLOG_LISTENERS_JSON: '[]'
      # 默认使用被动拉取；如需切换为主动上传，请改为 DELIVERY_MODE=dual、ENABLE_KAFKA_PIPELINE=true
      DELIVERY_MODE: "pull"
      ENABLE_KAFKA_PIPELINE: "false"
      CONTROL_PLANE_BASE_URL: "http://control-plane:8080"
      AGENT_METRICS_REPORT_ENABLED: "true"
      AGENT_METRICS_REPORT_INTERVAL: "30s"
      AGENT_METRICS_REPORT_TIMEOUT: "10s"
      CHECKPOINT_DIR: "/var/lib/collector-agent/checkpoints"
      CACHE_DIR: "/var/lib/collector-agent/cache"
      # 以下 Kafka 参数仅在主动上传（Kafka 兼容）模式下生效
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "nexuslog.logs.raw"
      KAFKA_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      KAFKA_SCHEMA_SUBJECT: "nexuslog.logs.raw-value"
      KAFKA_REQUIRED_ACKS: "all"
    volumes:
      - ./configs:/app/configs:ro
      - ./state/checkpoints:/var/lib/collector-agent/checkpoints
      - ./state/cache:/var/lib/collector-agent/cache
      - /var/log:/var/log:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9091/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
