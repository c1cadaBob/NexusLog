# NexusLog Kafka Client Quotas 配置
# change_level: cab
# 生效时间: 发布窗口

# 生产者配额
producer_quotas:
  # 采集代理 - 高吞吐
  collector-agent:
    producer_byte_rate: 104857600  # 100MB/s
    request_percentage: 30

  # 控制面服务 - 中等吞吐
  control-plane:
    producer_byte_rate: 10485760  # 10MB/s
    request_percentage: 10

  # API 服务 - 低吞吐
  api-service:
    producer_byte_rate: 5242880  # 5MB/s
    request_percentage: 5

# 消费者配额
consumer_quotas:
  # Flink 流计算 - 高吞吐
  flink-jobs:
    consumer_byte_rate: 209715200  # 200MB/s
    request_percentage: 40

  # Elasticsearch 写入 - 高吞吐
  es-sink:
    consumer_byte_rate: 104857600  # 100MB/s
    request_percentage: 30

  # 告警引擎 - 中等吞吐
  alert-engine:
    consumer_byte_rate: 52428800  # 50MB/s
    request_percentage: 15

# 默认配额（未指定客户端）
default_quotas:
  producer_byte_rate: 1048576  # 1MB/s
  consumer_byte_rate: 5242880  # 5MB/s
  request_percentage: 5
