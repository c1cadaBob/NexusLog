# NexusLog Storage - Helm Values

elasticsearch:
  replicas: 3
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: "8.13.0"
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  storage:
    size: 100Gi
    storageClass: nexuslog-elasticsearch

postgresql:
  replicas: 3
  image:
    repository: postgres
    tag: "16"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  storage:
    size: 50Gi
    storageClass: nexuslog-postgresql

redis:
  replicas: 6
  image:
    repository: redis
    tag: "7.2"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

minio:
  replicas: 4
  image:
    repository: minio/minio
    tag: latest
  storage:
    size: 500Gi

# change_level: cab
changeLevel: cab
