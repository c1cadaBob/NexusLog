# NexusLog Gateway - Helm Values
replicaCount: 2

image:
  repository: nexuslog/gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  httpPort: 80
  httpsPort: 443

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: nexuslog.local
      paths:
        - path: /
          pathType: Prefix

# change_level: cab
changeLevel: cab
