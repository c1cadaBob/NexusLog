apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-data-plane
  labels:
    app.kubernetes.io/name: nexuslog-data-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: nexuslog-data-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
