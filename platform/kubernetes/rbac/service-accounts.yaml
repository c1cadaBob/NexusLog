# NexusLog RBAC - ServiceAccounts
# 各服务的 ServiceAccount 定义
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexuslog-control-plane
  namespace: nexuslog-control-plane
  labels:
    app.kubernetes.io/part-of: nexuslog
    app.kubernetes.io/component: control-plane
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexuslog-api-service
  namespace: nexuslog-control-plane
  labels:
    app.kubernetes.io/part-of: nexuslog
    app.kubernetes.io/component: api-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexuslog-health-worker
  namespace: nexuslog-control-plane
  labels:
    app.kubernetes.io/part-of: nexuslog
    app.kubernetes.io/component: health-worker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexuslog-collector-agent
  namespace: nexuslog-agents
  labels:
    app.kubernetes.io/part-of: nexuslog
    app.kubernetes.io/component: collector-agent
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexuslog-gateway
  namespace: nexuslog-gateway
  labels:
    app.kubernetes.io/part-of: nexuslog
    app.kubernetes.io/component: gateway
