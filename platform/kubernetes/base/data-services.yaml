# Data Services (query-api / audit-api / export-api) - Deployment + Service + ConfigMap
# ============================================================
# Query API
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: query-api-config
  namespace: nexuslog-data-plane
  labels:
    app.kubernetes.io/name: query-api
    app.kubernetes.io/part-of: nexuslog
data:
  config.yaml: |
    server:
      http_port: 8082
    database:
      elasticsearch:
        addresses:
          - http://elasticsearch.nexuslog-storage.svc.cluster.local:9200
      postgresql:
        host: postgres.nexuslog-storage.svc.cluster.local
        port: 5432
        dbname: nexuslog
    logging:
      level: info
      format: json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  namespace: nexuslog-data-plane
  labels:
    app.kubernetes.io/name: query-api
    app.kubernetes.io/part-of: nexuslog
    app.kubernetes.io/component: data-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: query-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: query-api
        app.kubernetes.io/part-of: nexuslog
    spec:
      containers:
        - name: query-api
          image: nexuslog/query-api:latest
          ports:
            - containerPort: 8082
              name: http
          volumeMounts:
            - name: config
              mountPath: /app/configs
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: query-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: query-api
  namespace: nexuslog-data-plane
  labels:
    app.kubernetes.io/name: query-api
    app.kubernetes.io/part-of: nexuslog
spec:
  selector:
    app.kubernetes.io/name: query-api
  ports:
    - port: 8082
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
---
