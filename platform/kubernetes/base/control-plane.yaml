# Control Plane 服务 - Deployment + Service + ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-config
  namespace: nexuslog-control-plane
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: nexuslog
data:
  config.yaml: |
    server:
      http_port: 8080
      grpc_port: 9090
      read_timeout: 10s
      write_timeout: 10s
      shutdown_timeout: 10s
    database:
      postgresql:
        host: postgres.nexuslog-storage.svc.cluster.local
        port: 5432
        dbname: nexuslog
        sslmode: require
    cache:
      redis:
        addr: redis.nexuslog-storage.svc.cluster.local:6379
        db: 0
    search:
      elasticsearch:
        addresses:
          - http://elasticsearch.nexuslog-storage.svc.cluster.local:9200
    messaging:
      kafka:
        brokers:
          - kafka.nexuslog-stream.svc.cluster.local:9092
    logging:
      level: info
      format: json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: nexuslog-control-plane
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: nexuslog
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/part-of: nexuslog
    spec:
      serviceAccountName: nexuslog-control-plane
      containers:
        - name: control-plane
          image: nexuslog/control-plane:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          volumeMounts:
            - name: config
              mountPath: /app/configs
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: control-plane-config
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: nexuslog-control-plane
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: nexuslog
spec:
  selector:
    app.kubernetes.io/name: control-plane
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: grpc
      protocol: TCP
      name: grpc
  type: ClusterIP
