# NexusLog GitOps - Prod 集群配置
# 生产环境集群参数
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-config
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nexuslog
    nexuslog.io/env: prod
data:
  cluster.name: nexuslog-prod
  cluster.env: prod
  cluster.region: cn-hangzhou
  log.level: warn
  replicas.default: "3"
  resources.profile: production
