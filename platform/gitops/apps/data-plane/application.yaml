apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexuslog-data-plane
  namespace: argocd
spec:
  project: nexuslog
  source:
    repoURL: "https://github.com/nexuslog/nexuslog.git"
    targetRevision: main
    path: platform/helm/nexuslog-data-plane
  destination:
    server: "https://kubernetes.default.svc"
    namespace: nexuslog-data-plane
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
