# NexusLog Argo CD ApplicationSet
# 使用 ApplicationSet 统一管理多环境部署
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nexuslog-services
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - component: gateway
                  namespace: nexuslog-gateway
                  chartPath: platform/helm/nexuslog-gateway
                - component: control-plane
                  namespace: nexuslog-control-plane
                  chartPath: platform/helm/nexuslog-control-plane
                - component: data-plane
                  namespace: nexuslog-data-plane
                  chartPath: platform/helm/nexuslog-data-plane
                - component: storage
                  namespace: nexuslog-storage
                  chartPath: platform/helm/nexuslog-storage
                - component: observability
                  namespace: nexuslog-observability
                  chartPath: platform/helm/nexuslog-observability
          - list:
              elements:
                - env: dev
                  cluster: dev-cluster
                  revision: develop
                - env: staging
                  cluster: staging-cluster
                  revision: release/*
                - env: prod
                  cluster: prod-cluster
                  revision: main
  template:
    metadata:
      name: "nexuslog-{{component}}-{{env}}"
    spec:
      project: nexuslog
      source:
        repoURL: "https://github.com/nexuslog/nexuslog.git"
        targetRevision: "{{revision}}"
        path: "{{chartPath}}"
        helm:
          valueFiles:
            - values.yaml
            - "values-{{env}}.yaml"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
