# NexusLog Istio DestinationRule - Control Plane
# 控制面服务的流量策略和子集定义
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: nexuslog-control-plane
  namespace: nexuslog-control-plane
spec:
  host: nexuslog-control-plane.nexuslog-control-plane.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: stable
      labels:
        version: stable
    - name: canary
      labels:
        version: canary
