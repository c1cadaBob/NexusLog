# NexusLog Istio DestinationRule - Data Plane
# 数据面服务的流量策略
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: nexuslog-data-plane
  namespace: nexuslog-data-plane
spec:
  host: nexuslog-data-plane.nexuslog-data-plane.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 200
      http:
        http1MaxPendingRequests: 200
        http2MaxRequests: 2000
    loadBalancer:
      simple: LEAST_REQUEST
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 15s
      baseEjectionTime: 60s
      maxEjectionPercent: 30
