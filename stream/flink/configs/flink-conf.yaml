# NexusLog Flink 本地开发配置
# 说明：该文件与 docker-compose 本地运行参数保持一致。
# 生产环境的 HA / HDFS / 远端状态后端不在本地 compose 首里程碑范围内。

jobmanager:
  rpc:
    address: flink-jobmanager
    port: 6123
  memory:
    process:
      size: 1024m
  execution:
    failover-strategy: region

taskmanager:
  numberOfTaskSlots: 4
  memory:
    process:
      size: 2048m

high-availability:
  type: none

execution:
  checkpointing:
    interval: 60000
    mode: EXACTLY_ONCE
    timeout: 600000
    min-pause: 500
    max-concurrent: 1

state:
  backend: hashmap
  checkpoints:
    dir: file:///tmp/flink-checkpoints
  savepoints:
    dir: file:///tmp/flink-savepoints

restart-strategy:
  type: exponential-delay
  exponential-delay:
    initial-backoff: 1s
    max-backoff: 60s
    backoff-multiplier: 2.0
    reset-backoff-threshold: 120s

kafka:
  default:
    properties:
      bootstrap.servers: kafka:9092
      group.id: nexuslog-flink
      auto.offset.reset: latest
      enable.auto.commit: false

metrics:
  reporters:
    prometheus:
      factory:
        class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
      port: 9249

rest:
  port: 8081
  address: 0.0.0.0
