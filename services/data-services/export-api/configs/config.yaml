# export-api 服务配置
# change_level: none | normal | cab

server:
  http_port: 8084
  change_level: none
  hot_reload: true
  read_timeout: 10s
  write_timeout: 60s
  shutdown_timeout: 30s

database:
  elasticsearch:
    addresses:
      - http://localhost:9200
    change_level: cab
    hot_reload: partial
  postgresql:
    host: localhost
    port: 5432
    dbname: nexuslog
    sslmode: require
    max_open_conns: 10
    max_idle_conns: 3
    change_level: cab
    hot_reload: partial

export:
  # 导出任务配置
  max_concurrent_jobs: 5
  max_rows_per_export: 1000000
  temp_dir: /tmp/nexuslog-export
  change_level: none
  hot_reload: true

storage:
  minio:
    endpoint: localhost:9000
    bucket: nexuslog-exports
    change_level: normal
    hot_reload: true

logging:
  level: info
  format: json
  change_level: none
  hot_reload: true
