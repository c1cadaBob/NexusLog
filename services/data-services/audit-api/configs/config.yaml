# audit-api 服务配置
# change_level: none | normal | cab

server:
  http_port: 8083
  change_level: normal
  hot_reload: true
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 10s

database:
  postgresql:
    host: localhost
    port: 5432
    dbname: nexuslog_audit
    sslmode: require
    max_open_conns: 15
    max_idle_conns: 5
    change_level: cab
    hot_reload: partial

retention:
  # 审计日志保留策略
  max_days: 365
  archive_after_days: 90
  change_level: normal
  hot_reload: true

logging:
  level: info
  format: json
  change_level: none
  hot_reload: true
