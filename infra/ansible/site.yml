# NexusLog - 主 Playbook
# 用法: ansible-playbook -i inventories/<env>/hosts.yml site.yml
---
- name: 基础环境配置
  hosts: all
  become: yes
  roles:
    - server-init
    - security-hardening
    - docker

- name: Kubernetes 集群初始化
  hosts: k8s_masters:k8s_workers
  become: yes
  roles:
    - server-init

- name: 存储节点配置
  hosts: storage
  become: yes
  roles:
    - server-init
