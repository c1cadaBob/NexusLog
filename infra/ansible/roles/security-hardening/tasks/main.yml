---
# NexusLog - security-hardening 安全加固

- name: 禁止 root 通过 SSH 直接登录
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin\s+'
    line: "PermitRootLogin {{ security_permit_root_login }}"
    create: no
    backup: yes
  notify: 重启 SSH 服务

- name: 关闭 SSH 密码认证
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s+'
    line: "PasswordAuthentication {{ security_password_authentication }}"
    create: no
    backup: yes
  notify: 重启 SSH 服务

- name: 下发安全 sysctl 配置
  ansible.builtin.template:
    src: 99-nexuslog-hardening.conf.j2
    dest: /etc/sysctl.d/99-nexuslog-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: 重新加载 sysctl
