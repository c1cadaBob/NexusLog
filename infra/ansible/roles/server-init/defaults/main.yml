---
# NexusLog - server-init 角色默认变量

server_init_timezone: "Asia/Shanghai"

server_init_base_packages:
  - curl
  - wget
  - vim
  - htop
  - jq
  - unzip
  - net-tools
  - chrony

server_init_sysctl:
  vm.max_map_count: "262144"
  net.core.somaxconn: "65535"
  net.ipv4.tcp_max_syn_backlog: "65535"
  fs.file-max: "1000000"
