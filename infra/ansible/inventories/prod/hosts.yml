# NexusLog - 生产环境 Ansible 主机清单
---
all:
  vars:
    ansible_user: deploy
    ansible_ssh_private_key_file: ~/.ssh/nexuslog-prod.pem
    environment: prod
    project_name: nexuslog

  children:
    k8s_masters:
      hosts:
        k8s-master-prod-01:
          ansible_host: 10.30.1.10
        k8s-master-prod-02:
          ansible_host: 10.30.1.11
        k8s-master-prod-03:
          ansible_host: 10.30.1.12

    k8s_workers:
      hosts:
        k8s-worker-prod-01:
          ansible_host: 10.30.1.20
        k8s-worker-prod-02:
          ansible_host: 10.30.1.21
        k8s-worker-prod-03:
          ansible_host: 10.30.1.22
        k8s-worker-prod-04:
          ansible_host: 10.30.1.23
        k8s-worker-prod-05:
          ansible_host: 10.30.1.24

    storage:
      children:
        elasticsearch:
          hosts:
            es-prod-01:
              ansible_host: 10.30.2.10
            es-prod-02:
              ansible_host: 10.30.2.11
            es-prod-03:
              ansible_host: 10.30.2.12
        postgresql:
          hosts:
            pg-prod-01:
              ansible_host: 10.30.2.20
            pg-prod-02:
              ansible_host: 10.30.2.21
            pg-prod-03:
              ansible_host: 10.30.2.22
        redis:
          hosts:
            redis-prod-01:
              ansible_host: 10.30.2.30
            redis-prod-02:
              ansible_host: 10.30.2.31
            redis-prod-03:
              ansible_host: 10.30.2.32

    messaging:
      hosts:
        kafka-prod-01:
          ansible_host: 10.30.3.10
        kafka-prod-02:
          ansible_host: 10.30.3.11
        kafka-prod-03:
          ansible_host: 10.30.3.12
