# NexusLog - 开发环境 Ansible 主机清单
---
all:
  vars:
    ansible_user: deploy
    ansible_ssh_private_key_file: ~/.ssh/nexuslog-dev.pem
    environment: dev
    project_name: nexuslog

  children:
    k8s_masters:
      hosts:
        k8s-master-dev-01:
          ansible_host: 10.10.1.10

    k8s_workers:
      hosts:
        k8s-worker-dev-01:
          ansible_host: 10.10.1.20
        k8s-worker-dev-02:
          ansible_host: 10.10.1.21

    storage:
      children:
        elasticsearch:
          hosts:
            es-dev-01:
              ansible_host: 10.10.2.10
        postgresql:
          hosts:
            pg-dev-01:
              ansible_host: 10.10.2.20
        redis:
          hosts:
            redis-dev-01:
              ansible_host: 10.10.2.30

    messaging:
      hosts:
        kafka-dev-01:
          ansible_host: 10.10.3.10
