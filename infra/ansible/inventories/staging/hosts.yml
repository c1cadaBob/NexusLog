# NexusLog - 预发布环境 Ansible 主机清单
---
all:
  vars:
    ansible_user: deploy
    ansible_ssh_private_key_file: ~/.ssh/nexuslog-staging.pem
    environment: staging
    project_name: nexuslog

  children:
    k8s_masters:
      hosts:
        k8s-master-staging-01:
          ansible_host: 10.20.1.10
        k8s-master-staging-02:
          ansible_host: 10.20.1.11

    k8s_workers:
      hosts:
        k8s-worker-staging-01:
          ansible_host: 10.20.1.20
        k8s-worker-staging-02:
          ansible_host: 10.20.1.21
        k8s-worker-staging-03:
          ansible_host: 10.20.1.22

    storage:
      children:
        elasticsearch:
          hosts:
            es-staging-01:
              ansible_host: 10.20.2.10
            es-staging-02:
              ansible_host: 10.20.2.11
        postgresql:
          hosts:
            pg-staging-01:
              ansible_host: 10.20.2.20
            pg-staging-02:
              ansible_host: 10.20.2.21
        redis:
          hosts:
            redis-staging-01:
              ansible_host: 10.20.2.30
            redis-staging-02:
              ansible_host: 10.20.2.31

    messaging:
      hosts:
        kafka-staging-01:
          ansible_host: 10.20.3.10
        kafka-staging-02:
          ansible_host: 10.20.3.11
