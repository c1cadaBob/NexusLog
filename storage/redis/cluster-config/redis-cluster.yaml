# NexusLog Redis Cluster 配置模板
# change_level: cab（TTL 热更；拓扑变更重启）
# 生效时间: 分钟级

cluster:
  # 集群节点（3 主 3 从）
  nodes:
    - host: redis-0
      port: 6379
      role: master
    - host: redis-1
      port: 6379
      role: master
    - host: redis-2
      port: 6379
      role: master
    - host: redis-3
      port: 6379
      role: replica
    - host: redis-4
      port: 6379
      role: replica
    - host: redis-5
      port: 6379
      role: replica

  # 集群配置
  cluster-enabled: "yes"
  cluster-config-file: nodes.conf
  cluster-node-timeout: 15000
  cluster-require-full-coverage: "no"

# 通用配置
redis:
  # 内存
  maxmemory: 4gb
  maxmemory-policy: allkeys-lru

  # 持久化
  save: ""  # 禁用 RDB（集群模式推荐）
  appendonly: "yes"
  appendfsync: everysec
  auto-aof-rewrite-percentage: 100
  auto-aof-rewrite-min-size: 64mb

  # 网络
  tcp-backlog: 511
  timeout: 300
  tcp-keepalive: 60

  # 安全（生产环境启用）
  # requirepass: "${REDIS_PASSWORD}"
  # masterauth: "${REDIS_PASSWORD}"

  # 慢查询日志
  slowlog-log-slower-than: 10000
  slowlog-max-len: 128

# 缓存 TTL 策略（可热更新）
ttl_policies:
  # 会话缓存
  session: 3600        # 1 小时
  # API 响应缓存
  api_cache: 300       # 5 分钟
  # Dashboard 数据缓存
  dashboard: 60        # 1 分钟
  # 用户权限缓存
  permissions: 600     # 10 分钟
  # 告警规则缓存
  alert_rules: 300     # 5 分钟
