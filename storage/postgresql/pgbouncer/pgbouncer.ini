; NexusLog PgBouncer 连接池配置
; change_level: normal
; 生效时间: 分钟级（reload 优先）

[databases]
; 数据库连接配置
nexuslog = host=pg-primary port=5432 dbname=nexuslog
nexuslog_readonly = host=pg-replica port=5432 dbname=nexuslog

[pgbouncer]
; 监听配置
listen_addr = 0.0.0.0
listen_port = 6432

; 认证
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; 连接池模式
pool_mode = transaction

; 连接池大小
default_pool_size = 25
min_pool_size = 5
max_client_conn = 500
max_db_connections = 100

; 超时配置
server_idle_timeout = 600
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 0
query_wait_timeout = 120

; 日志
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; 管理
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats
