# NexusLog 前端构建测试流水线
# 触发条件：前端代码变更时自动运行
name: Frontend CI

on:
  push:
    branches: [main, develop, 'release/**']
    paths:
      - 'apps/frontend-console/**'
      - 'tests/e2e/**'
      - 'Makefile'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/frontend-console/**'
      - 'tests/e2e/**'
      - 'Makefile'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint-and-typecheck:
    name: Lint & 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: TypeScript 类型检查
        run: pnpm --filter @nexuslog/frontend-console exec tsc --noEmit

      - name: ESLint 检查
        run: pnpm --filter @nexuslog/frontend-console lint

  test:
    name: 单元测试 & 属性测试
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行测试
        run: pnpm --filter @nexuslog/frontend-console test

      - name: 运行测试（含覆盖率）
        run: pnpm --filter @nexuslog/frontend-console test:coverage
        if: github.event_name == 'pull_request'

  build:
    name: 生产构建
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建
        run: pnpm --filter @nexuslog/frontend-console build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/frontend-console/dist/
          retention-days: 7

  e2e-smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 安装 E2E 依赖
        run: npm ci
        working-directory: tests/e2e

      - name: 安装 Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: 运行 Playwright Smoke
        run: make e2e-smoke-ci

      - name: 上传 Playwright 报告
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 7
