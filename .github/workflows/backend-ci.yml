# NexusLog 后端构建测试流水线
# 触发条件：Go 服务代码变更时自动运行
name: Backend CI

on:
  push:
    branches: [main, develop, 'release/**']
    paths:
      - 'services/**'
      - 'agents/**'
      - 'go.work'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'agents/**'
      - 'go.work'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.23'

jobs:
  detect-changes:
    name: 检测变更服务
    runs-on: ubuntu-latest
    outputs:
      control-plane: ${{ steps.changes.outputs.control-plane }}
      health-worker: ${{ steps.changes.outputs.health-worker }}
      api-service: ${{ steps.changes.outputs.api-service }}
      data-services: ${{ steps.changes.outputs.data-services }}
      collector-agent: ${{ steps.changes.outputs.collector-agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            control-plane:
              - 'services/control-plane/**'
            health-worker:
              - 'services/health-worker/**'
            api-service:
              - 'services/api-service/**'
            data-services:
              - 'services/data-services/**'
            collector-agent:
              - 'agents/collector-agent/**'

  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: .

  test-control-plane:
    name: 测试 Control Plane
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: needs.detect-changes.outputs.control-plane == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 运行测试
        run: go test -v -race -coverprofile=coverage.out ./...
        working-directory: services/control-plane

      - name: 构建
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/control-plane ./cmd/api/
        working-directory: services/control-plane

  test-health-worker:
    name: 测试 Health Worker
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: needs.detect-changes.outputs.health-worker == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 运行测试
        run: go test -v -race -coverprofile=coverage.out ./...
        working-directory: services/health-worker

      - name: 构建
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/health-worker ./cmd/worker/
        working-directory: services/health-worker

  test-api-service:
    name: 测试 API Service
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: needs.detect-changes.outputs.api-service == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 运行测试
        run: go test -v -race -coverprofile=coverage.out ./...
        working-directory: services/api-service

      - name: 构建
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/api-service ./cmd/api/
        working-directory: services/api-service

  test-data-services:
    name: 测试 Data Services
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: needs.detect-changes.outputs.data-services == 'true' || github.event_name == 'push'
    strategy:
      matrix:
        service: [query-api, audit-api, export-api]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 运行测试
        run: go test -v -race -coverprofile=coverage.out ./...
        working-directory: services/data-services/${{ matrix.service }}

      - name: 构建
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/${{ matrix.service }} ./cmd/api/
        working-directory: services/data-services/${{ matrix.service }}

  test-collector-agent:
    name: 测试 Collector Agent
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: needs.detect-changes.outputs.collector-agent == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 运行测试
        run: go test -v -race -coverprofile=coverage.out ./...
        working-directory: agents/collector-agent

      - name: 构建
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/collector-agent ./cmd/agent/
        working-directory: agents/collector-agent
