# NexusLog 本地开发环境
# 使用方式: docker compose up -d
# 停止: docker compose down
# 清理数据: docker compose down -v

services:
  # ============================================================
  # 前端服务
  # ============================================================
  frontend-console:
    build:
      context: ./apps/frontend-console
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./apps/frontend-console/public/config:/usr/share/nginx/html/config:ro
    depends_on:
      - api-service
    networks:
      - nexuslog-net
    restart: unless-stopped

  # ============================================================
  # 后端微服务
  # ============================================================
  control-plane:
    build:
      context: ./services/control-plane
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SERVER_HTTP_PORT=8080
      - SERVER_GRPC_PORT=9090
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
      - CACHE_REDIS_ADDR=redis:6379
      - SEARCH_ELASTICSEARCH_ADDRESSES=http://elasticsearch:9200
      - MESSAGING_KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  api-service:
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    ports:
      - "8085:8080"
    environment:
      - SERVER_HTTP_PORT=8080
      - DATABASE_ELASTICSEARCH_ADDRESSES=http://elasticsearch:9200
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
      - CACHE_REDIS_ADDR=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  health-worker:
    build:
      context: ./services/health-worker
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SERVER_HTTP_PORT=8081
      - CACHE_REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  query-api:
    build:
      context: ./services/data-services
      dockerfile: query-api/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SERVER_HTTP_PORT=8082
      - DATABASE_ELASTICSEARCH_ADDRESSES=http://elasticsearch:9200
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  audit-api:
    build:
      context: ./services/data-services
      dockerfile: audit-api/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SERVER_HTTP_PORT=8083
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  export-api:
    build:
      context: ./services/data-services
      dockerfile: export-api/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SERVER_HTTP_PORT=8084
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  # ============================================================
  # IAM 安全体系
  # ============================================================
  keycloak:
    build:
      context: ./iam/keycloak
      dockerfile: Dockerfile
    ports:
      - "8180:8080"
    environment:
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgres
      - KC_DB_URL_DATABASE=keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak_dev
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - FRONTEND_URL=http://localhost:3000
    command: ["start-dev", "--import-realm"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - nexuslog-net
    restart: unless-stopped

  opa:
    build:
      context: ./iam/opa
      dockerfile: Dockerfile
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/opa", "eval", "-d", "/policies", "true"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - nexuslog-net
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.15
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=nexuslog-dev-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./iam/vault/policies:/vault/policies:ro
      - ./iam/vault/config/vault-dev.hcl:/vault/config/vault-dev.hcl:ro
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - nexuslog-net
    restart: unless-stopped

  # ============================================================
  # 基础设施服务
  # ============================================================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nexuslog
      - POSTGRES_USER=nexuslog
      - POSTGRES_PASSWORD=nexuslog_dev
      - POSTGRES_MULTIPLE_DATABASES=keycloak
      - KEYCLOAK_DB_USER=keycloak
      - KEYCLOAK_DB_PASSWORD=keycloak_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexuslog"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexuslog-net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexuslog-net
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=nexuslog-dev
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexuslog-net
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexuslog-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexuslog-net
    restart: unless-stopped

  # Kafka Topic 初始化（一次性任务）
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    entrypoint: ["/bin/bash", "/scripts/init-topics.sh", "kafka:9092"]
    volumes:
      - ./messaging/kafka/scripts:/scripts:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: "no"

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    ports:
      - "8081:8081"
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_KAFKASTORE_TOPIC=_schemas
      - SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL=BACKWARD
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexuslog-net
    restart: unless-stopped

  # ============================================================
  # 流计算服务
  # ============================================================
  flink-jobmanager:
    build:
      context: ./stream/flink
      dockerfile: Dockerfile
    ports:
      - "8088:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        jobmanager.memory.process.size: 1024m
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 60000
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  flink-taskmanager:
    build:
      context: ./stream/flink
      dockerfile: Dockerfile
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    depends_on:
      - flink-jobmanager
    networks:
      - nexuslog-net
    restart: unless-stopped

# ============================================================
# 网络
# ============================================================
networks:
  nexuslog-net:
    driver: bridge

# ============================================================
# 持久化卷
# ============================================================
volumes:
  postgres-data:
  redis-data:
  es-data:
  zk-data:
  zk-logs:
  kafka-data:
  vault-data:
