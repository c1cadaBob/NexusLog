# NexusLog 本地开发环境
# 使用方式:
#   基础启动: set -a && source .env.mirrors && set +a && docker compose -f docker-compose.yml up -d
#   开发热更新: set -a && source .env.mirrors && set +a && docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
# 停止: set -a && source .env.mirrors && set +a && docker compose -f docker-compose.yml -f docker-compose.override.yml down
# 清理数据: set -a && source .env.mirrors && set +a && docker compose -f docker-compose.yml -f docker-compose.override.yml down -v

services:
  # ============================================================
  # 前端服务
  # ============================================================
  frontend-console:
    build:
      context: ./apps/frontend-console
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./apps/frontend-console/public/config:/usr/share/nginx/html/config:ro
    depends_on:
      - api-service
      - bff-service
    networks:
      - nexuslog-net
    restart: unless-stopped

  # ============================================================
  # 后端微服务
  # ============================================================
  control-plane:
    build:
      context: ./services/control-plane
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9090:9090"
    environment:
      - SERVER_HTTP_PORT=8080
      - SERVER_GRPC_PORT=9090
      - JWT_SECRET=nexuslog-local-dev-jwt-secret-20260314-change-before-production
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
      - CACHE_REDIS_ADDR=redis:6379
      - SEARCH_ELASTICSEARCH_ADDRESSES=http://elasticsearch:9200
      - MESSAGING_KAFKA_BROKERS=kafka:9092
      - ALERT_EVALUATOR_ENABLED=true
      - ALERT_EVALUATOR_INTERVAL=15s
      - ALERT_EVALUATOR_ES_INDEX=nexuslog-logs-read
      - ALERTMANAGER_BRIDGE_ENABLED=true
      - ALERTMANAGER_BRIDGE_INTERVAL=10s
      - ALERTMANAGER_URL=http://alertmanager:9093
      - ALERTMANAGER_GENERATOR_URL=http://localhost:8080
      - INGEST_ES_INDEX=nexuslog-logs-write-pull
      - INGEST_DEFAULT_TENANT_ID=${INGEST_DEFAULT_TENANT_ID:-}
      - INGEST_DEFAULT_AGENT_KEY=nexuslog-local-dev-agent-key-20260314-change-before-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  api-service:
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      - SERVER_HTTP_PORT=8080
      - JWT_SECRET=nexuslog-local-dev-jwt-secret-20260314-change-before-production
      - DATABASE_ELASTICSEARCH_ADDRESSES=http://elasticsearch:9200
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
      - CACHE_REDIS_ADDR=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  bff-service:
    build:
      context: ./apps/bff-service
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - BFF_PORT=3000
      - CONTROL_PLANE_BASE_URL=http://control-plane:8080
      - API_SERVICE_BASE_URL=http://api-service:8080
      - DATA_QUERY_BASE_URL=http://query-api:8082
      - DATA_AUDIT_BASE_URL=http://audit-api:8083
      - DATA_EXPORT_BASE_URL=http://export-api:8084
      - BFF_REQUEST_TIMEOUT_MS=2500
      - BFF_CACHE_TTL_MS=10000
    depends_on:
      - control-plane
      - api-service
      - query-api
      - audit-api
      - export-api
    networks:
      - nexuslog-net
    restart: unless-stopped

  health-worker:
    build:
      context: ./services/health-worker
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - SERVER_HTTP_PORT=8081
      - CACHE_REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  query-api:
    build:
      context: ./services/data-services
      dockerfile: query-api/Dockerfile
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      - SERVER_HTTP_PORT=8082
      - JWT_SECRET=nexuslog-local-dev-jwt-secret-20260314-change-before-production
      - DATABASE_ELASTICSEARCH_ADDRESSES=http://elasticsearch:9200
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
      - QUERY_LOGS_INDEX=nexuslog-logs-read
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  audit-api:
    build:
      context: ./services/data-services
      dockerfile: audit-api/Dockerfile
    ports:
      - "127.0.0.1:8083:8083"
    environment:
      - SERVER_HTTP_PORT=8083
      - JWT_SECRET=nexuslog-local-dev-jwt-secret-20260314-change-before-production
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  export-api:
    build:
      context: ./services/data-services
      dockerfile: export-api/Dockerfile
    ports:
      - "127.0.0.1:8084:8084"
    environment:
      - SERVER_HTTP_PORT=8084
      - JWT_SECRET=nexuslog-local-dev-jwt-secret-20260314-change-before-production
      - DATABASE_POSTGRESQL_HOST=postgres
      - DATABASE_POSTGRESQL_PORT=5432
      - DATABASE_POSTGRESQL_DBNAME=nexuslog
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  # ============================================================
  # IAM 安全体系
  # ============================================================
  keycloak:
    build:
      context: ./iam/keycloak
      dockerfile: Dockerfile
    ports:
      - "8180:8080"
    environment:
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgres
      - KC_DB_URL_DATABASE=keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak_dev
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - FRONTEND_URL=http://localhost:3000
    command: ["start-dev", "--import-realm"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - nexuslog-net
    restart: unless-stopped

  opa:
    build:
      context: ./iam/opa
      dockerfile: Dockerfile
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/opa", "eval", "-d", "/policies", "true"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - nexuslog-net
    restart: unless-stopped

  vault:
    image: ${MIRROR_DOCKER_HUB}/hashicorp/vault:1.15
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=nexuslog-dev-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./iam/vault/policies:/vault/policies:ro
      - ./iam/vault/config/vault-dev.hcl:/vault/config/vault-dev.hcl:ro
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - nexuslog-net
    restart: unless-stopped

  # ============================================================
  # 基础设施服务
  # ============================================================
  postgres:
    image: ${MIRROR_DOCKER_HUB}/postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nexuslog
      - POSTGRES_USER=nexuslog
      - POSTGRES_PASSWORD=nexuslog_dev
      - POSTGRES_MULTIPLE_DATABASES=keycloak
      - KEYCLOAK_DB_USER=keycloak
      - KEYCLOAK_DB_PASSWORD=keycloak_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexuslog"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexuslog-net
    restart: unless-stopped

  redis:
    image: ${MIRROR_DOCKER_HUB}/redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexuslog-net
    restart: unless-stopped

  elasticsearch:
    image: ${MIRROR_ELASTIC}/elasticsearch/elasticsearch:8.13.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.ml.enabled=false
      - ingest.geoip.downloader.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=nexuslog-dev
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexuslog-net
    restart: unless-stopped

  elasticsearch-init:
    image: ${MIRROR_DOCKER_HUB}/confluentinc/cp-kafka:7.6.0
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/workspace/scripts/install-es-v2-template.sh"]
    environment:
      - ES_HOST=http://elasticsearch:9200
      - INSTALL_LOG_ALIASES=true
      - DATA_STREAM_NAME=nexuslog-logs-v2-pull
      - PULL_DATA_STREAM=nexuslog-logs-v2-pull
      - STREAM_DATA_STREAM=nexuslog-logs-v2-stream
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./:/workspace:ro
    networks:
      - nexuslog-net
    restart: "no"

  zookeeper:
    image: ${MIRROR_DOCKER_HUB}/confluentinc/cp-zookeeper:7.6.0
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ZOOKEEPER_4LW_COMMANDS_WHITELIST=srvr,ruok,stat,mntr
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexuslog-net
    restart: unless-stopped

  kafka:
    image: ${MIRROR_DOCKER_HUB}/confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexuslog-net
    restart: unless-stopped

  # Kafka Topic 初始化（一次性任务）
  kafka-init:
    image: ${MIRROR_DOCKER_HUB}/confluentinc/cp-kafka:7.6.0
    entrypoint: ["/bin/bash", "/scripts/init-topics.sh", "kafka:9092"]
    volumes:
      - ./messaging/kafka/scripts:/scripts:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: "no"

  # Schema Registry
  schema-registry:
    image: ${MIRROR_DOCKER_HUB}/confluentinc/cp-schema-registry:7.6.0
    ports:
      - "18081:8081"
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_KAFKASTORE_TOPIC=_schemas
      - SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL=BACKWARD
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexuslog-net
    restart: unless-stopped

  # ============================================================
  # 流计算服务
  # ============================================================
  schema-registry-init:
    image: ${MIRROR_DOCKER_HUB}/confluentinc/cp-schema-registry:7.6.0
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/workspace/scripts/register-schema-contracts.sh"]
    environment:
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - SCHEMA_REGISTRY_RESET_SUBJECTS=true
      - REGISTER_PARSED_SUBJECT=false
      - SCHEMA_FILE_LOG_RAW=/workspace/stream/flink/contracts/local/log-raw.avsc
      - SCHEMA_FILE_LOG_PARSED=/workspace/stream/flink/contracts/local/log-parsed.avsc
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ./:/workspace:ro
    networks:
      - nexuslog-net
    restart: "no"

  flink-jobmanager:
    build:
      context: ./stream/flink
      dockerfile: Dockerfile
    ports:
      - "8088:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        jobmanager.memory.process.size: 1024m
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 60000
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      schema-registry-init:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/overview >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - nexuslog-net
    restart: unless-stopped

  flink-taskmanager:
    build:
      context: ./stream/flink
      dockerfile: Dockerfile
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  flink-sql-init:
    build:
      context: ./stream/flink
      dockerfile: Dockerfile
    command: ["/bin/bash", "/opt/flink/jobs/submit-sql-jobs.sh"]
    environment:
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - FLINK_REST_URL=http://flink-jobmanager:8081
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        rest.address: flink-jobmanager
        rest.port: 8081
        execution.checkpointing.interval: 60000
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      elasticsearch-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
    networks:
      - nexuslog-net
    restart: "no"

  prometheus:
    image: ${MIRROR_DOCKER_HUB}/prom/prometheus:v2.52.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "19090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      elasticsearch:
        condition: service_healthy
      control-plane:
        condition: service_started
      api-service:
        condition: service_started
      query-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9090/-/ready >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - nexuslog-net
    restart: unless-stopped

  alertmanager:
    image: ${MIRROR_DOCKER_HUB}/prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.listen-address=:9093
      - --web.route-prefix=/
    ports:
      - "19093:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./observability/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9093/-/ready >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - nexuslog-net
    restart: unless-stopped

  grafana:
    image: ${MIRROR_DOCKER_HUB}/grafana/grafana:11.1.0
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards/nexuslog:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - nexuslog-net
    restart: unless-stopped

  node-exporter:
    image: ${MIRROR_DOCKER_HUB}/prom/node-exporter:v1.8.1
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - nexuslog-net
    restart: unless-stopped

  elasticsearch-exporter:
    image: ${MIRROR_DOCKER_HUB}/prometheuscommunity/elasticsearch-exporter:v1.8.0
    command:
      - --es.uri=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  kafka-exporter:
    image: ${MIRROR_DOCKER_HUB}/danielqsj/kafka-exporter:v1.8.0
    command:
      - --kafka.server=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  postgres-exporter:
    image: ${MIRROR_DOCKER_HUB}/prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://nexuslog:nexuslog_dev@postgres:5432/nexuslog?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

  redis-exporter:
    image: ${MIRROR_DOCKER_HUB}/oliver006/redis_exporter:v1.61.0
    command:
      - --redis.addr=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nexuslog-net
    restart: unless-stopped

# ============================================================
# 网络
# ============================================================
networks:
  nexuslog-net:
    driver: bridge

# ============================================================
# 持久化卷
# ============================================================
volumes:
  postgres-data:
  redis-data:
  es-data:
  zk-data:
  zk-logs:
  kafka-data:
  vault-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
