# NexusLog API Gateway - OpenResty 主配置
# 基于 OpenResty 1.25+ (Nginx + Lua)
# change_level: cab（涉及全局流量策略）

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/openresty/error.log warn;
pid /var/run/openresty.pid;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ========== 日志格式 ==========
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"request_id":"$request_id",'
        '"tenant_id":"$http_x_tenant_id"'
    '}';

    access_log /var/log/openresty/access.log json;

    # ========== 基础优化 ==========
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 50m;
    server_tokens off;

    # ========== Gzip 压缩 ==========
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml image/x-icon;

    # ========== Lua 共享字典 ==========
    lua_shared_dict rate_limit_store 10m;
    lua_shared_dict tenant_rate_limit 10m;
    lua_shared_dict auth_cache 5m;
    lua_shared_dict config_cache 2m;
    lua_shared_dict metrics_store 5m;
    lua_shared_dict tenant_config 5m;

    # ========== Lua 包路径 ==========
    lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/openresty/lua/?.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";

    # ========== 初始化 Lua 模块 ==========
    init_by_lua_block {
        -- 预加载常用模块
        require "resty.core"
    }

    # ========== 上游服务定义 ==========
    upstream control_plane {
        server control-plane:8080;
        keepalive 32;
    }

    upstream api_service {
        server api-service:8080;
        keepalive 32;
    }

    upstream frontend {
        server frontend-console:80;
        server frontend-console:3000 backup;
        keepalive 16;
    }

    # 引入额外上游和配置
    include /etc/openresty/conf.d/*.conf;

    # ========== 默认服务 ==========
    server {
        listen 80;
        server_name _;

        # 请求 ID 追踪：使用 OpenResty/Nginx 内置 $request_id，避免重复定义变量导致启动失败。
        add_header X-Request-ID $request_id always;

        # 安全头
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # ===== 健康检查（无需认证） =====
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nexuslog-gateway"}';
            add_header Content-Type application/json;
        }

        # ===== 网关指标端点（内部访问） =====
        location /metrics {
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
            content_by_lua_block {
                local metrics = require("metrics")
                metrics.expose()
            }
        }

        # ===== 前端静态资源（无需认证） =====
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== 认证端点（仅限流，不做 JWT 校验） =====
        location /api/v1/auth/ {
            access_by_lua_file /etc/openresty/lua/rate_limit.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ===== 多租户路由（基于 Path: /t/{tenant_id}/...） =====
        location ~ ^/t/([^/]+)/api/(.*)$ {
            set $tenant_id $1;
            set $tenant_api_path $2;

            access_by_lua_file /etc/openresty/lua/tenant_router.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            # 租户路由脚本会设置 $tenant_upstream 变量并完成认证
            proxy_pass http://api_service/api/$tenant_api_path$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Tenant-ID $tenant_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== BFF 聚合 API =====
        location /api/v1/bff/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://bff_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 查询 API（新标准前缀） =====
        location /api/v1/query/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://query_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 10s;
        }

        # ===== 审计 API（新标准前缀） =====
        location /api/v1/audit/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://audit_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 导出 API（新标准前缀） =====
        location /api/v1/export/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://export_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;
            proxy_send_timeout 10s;
        }

        # ===== 采集管理 API → control_plane =====
        location /api/v1/ingest/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://control_plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 告警 API → control_plane =====
        location /api/v1/alert/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://control_plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 事件管理 API → control_plane =====
        location /api/v1/incidents/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://control_plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 通知渠道 API → control_plane =====
        location /api/v1/notification/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://control_plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 资源监控/指标 API → control_plane =====
        location /api/v1/metrics/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://control_plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 资源监控 API → control_plane =====
        location /api/v1/resource/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://control_plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 备份/恢复 API → control_plane =====
        location /api/v1/backup/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://control_plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;
            proxy_send_timeout 10s;
        }

        # ===== 通用 API 服务（users/roles 等 → api_service） =====
        location /api/v1/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 控制面 API =====
        location /api/control/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://control_plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 数据查询服务 =====
        location /api/data/query/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://query_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 10s;
        }

        # ===== 数据审计服务 =====
        location /api/data/audit/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://audit_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 数据导出服务 =====
        location /api/data/export/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://export_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;
            proxy_send_timeout 10s;
        }

        # ===== 数据服务通用路由 =====
        location /api/data/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://query_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 10s;
        }

        # ===== WebSocket 连接 =====
        location /ws/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;

            proxy_pass http://api_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 3600s;
        }

        # ===== Keycloak 代理（认证 UI） =====
        location /auth/ {
            proxy_pass http://keycloak;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
        }
    }
}
