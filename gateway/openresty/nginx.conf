# NexusLog API Gateway - OpenResty 配置
# 基于 OpenResty 1.25+ (Nginx + Lua)
# change_level: cab

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/openresty/error.log warn;
pid /var/run/openresty.pid;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"request_id":"$request_id"'
    '}';

    access_log /var/log/openresty/access.log json;

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 50m;
    server_tokens off;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml image/x-icon;

    # Lua 共享字典（限流、缓存等）
    lua_shared_dict rate_limit_store 10m;
    lua_shared_dict auth_cache 5m;
    lua_shared_dict config_cache 2m;

    # Lua 包路径
    lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/openresty/lua/?.lua;;";

    # 上游服务定义
    upstream control_plane {
        server control-plane:8080;
        keepalive 32;
    }

    upstream api_service {
        server api-service:8080;
        keepalive 32;
    }

    upstream data_services {
        server data-services:8080;
        keepalive 32;
    }

    upstream frontend {
        server frontend-console:80;
        keepalive 16;
    }

    # 引入额外配置
    include /etc/openresty/conf.d/*.conf;

    # 默认服务
    server {
        listen 80;
        server_name _;

        # 请求 ID 追踪
        set $request_id $http_x_request_id;
        if ($request_id = '') {
            set $request_id $pid-$msec-$remote_addr;
        }
        add_header X-Request-ID $request_id always;

        # 安全头
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # 健康检查（无需认证）
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # 前端静态资源
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API 路由 - 通用 API 服务
        location /api/v1/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # 控制面 API
        location /api/control/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://control_plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # 数据服务 API
        location /api/data/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://data_services;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 10s;
        }

        # WebSocket 连接
        location /ws/ {
            access_by_lua_file /etc/openresty/lua/auth_check.lua;

            proxy_pass http://api_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 3600s;
        }

        # 认证端点（无需 auth_check，由后端处理）
        location /api/v1/auth/ {
            access_by_lua_file /etc/openresty/lua/rate_limit.lua;
            log_by_lua_file /etc/openresty/lua/logging.lua;

            proxy_pass http://api_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }
    }
}
