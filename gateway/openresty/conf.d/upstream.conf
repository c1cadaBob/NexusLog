# NexusLog API Gateway - 上游服务定义
# 独立管理后端服务的上游配置，便于按环境覆盖
# change_level: cab（涉及流量路由）

# 查询服务（Data Services 子服务）
upstream query_api {
    server query-api:8082;
    keepalive 32;
}

# 审计服务（Data Services 子服务）
upstream audit_api {
    server audit-api:8083;
    keepalive 16;
}

# 导出服务（Data Services 子服务）
upstream export_api {
    server export-api:8084;
    keepalive 16;
}

# BFF 服务（可选）
upstream bff_service {
    server bff-service:3000;
    keepalive 16;
}

# Keycloak 认证服务
upstream keycloak {
    server keycloak:8080;
    keepalive 8;
}
