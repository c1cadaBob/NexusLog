# ============================================================
# Alertmanager 配置模板
# NexusLog 可观测性平台
# ============================================================
# change_level: none（无需审批）
# hot_reload: true
# reload_method: HTTP POST /-/reload 或 SIGHUP 信号
# reload_command: curl -X POST http://localhost:9093/-/reload
# 启动参数: --web.enable-lifecycle（启用 /-/reload 端点）
#           --config.file=/etc/alertmanager/alertmanager.yml
# 生效时间: 秒级
# 说明: 路由规则、接收者、抑制规则、模板变更后 reload 即可秒级生效
# ============================================================

# 全局配置
global:
  # 告警恢复等待时间：告警触发后，等待此时间未再次触发则标记为已恢复
  resolve_timeout: 5m

  # SMTP 邮件配置（按需启用）
  # smtp_smarthost: "smtp.example.com:587"
  # smtp_from: "alertmanager@nexuslog.io"
  # smtp_auth_username: "alertmanager@nexuslog.io"
  # smtp_auth_password: ""
  # smtp_require_tls: true

# 路由树：定义告警的分发规则
route:
  # 用于分组的标签，相同标签值的告警会被合并为一组发送
  group_by: ["alertname", "cluster", "service"]
  # 分组等待时间：收到第一条告警后等待此时间，收集同组其他告警
  group_wait: 30s
  # 分组发送间隔：同一组告警的重复通知间隔
  group_interval: 5m
  # 重复通知间隔：已发送的告警在此时间后再次发送
  repeat_interval: 4h
  # 默认接收者
  receiver: "default-receiver"

  # 子路由规则
  routes:
    # 严重告警（P0/P1）：立即通知值班人员
    - match:
        severity: critical
      receiver: "critical-receiver"
      group_wait: 10s
      repeat_interval: 1h

    # 警告级别告警
    - match:
        severity: warning
      receiver: "warning-receiver"
      repeat_interval: 8h

    # 基础设施相关告警
    - match_re:
        service: "kafka|elasticsearch|redis|postgresql"
      receiver: "infra-receiver"
      group_by: ["alertname", "service", "instance"]

# 告警抑制规则：当高优先级告警触发时，抑制低优先级的同类告警
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    # 当这些标签相同时，抑制目标告警
    equal: ["alertname", "cluster", "service"]

# 接收者配置
receivers:
  - name: "default-receiver"
  - name: "critical-receiver"
  - name: "warning-receiver"
  - name: "infra-receiver"
