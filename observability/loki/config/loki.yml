# ============================================================
# Loki 日志聚合配置
# NexusLog 可观测性平台
# ============================================================
# change_level: none（无需审批）
# hot_reload: partial
# 热更新范围:
#   - limits_config（速率限制、保留期等）: 支持运行时 API 热更新
#     reload_method: Loki 租户级别限制可通过 runtime_config 文件热更新
#     reload_command: 修改 runtime-config.yml 后 Loki 自动检测
#     生效时间: 秒级
#   - schema_config / storage_config: 需滚动重启
#     生效时间: 发布窗口
# 说明: 日常运维（调整速率限制、保留期）优先使用热更新
#       存储结构变更走发布窗口滚动重启
# ============================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache

limits_config:
  # 每个租户的日志摄入速率限制
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # 每个查询最大返回条目数
  max_entries_limit_per_query: 5000
  # 日志保留期
  retention_period: 168h
  # 拒绝过旧的日志
  reject_old_samples: true
  reject_old_samples_max_age: 168h

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

analytics:
  reporting_enabled: false

# 运行时配置热更新（独立文件，Loki 自动监听变更）
runtime_config:
  file: /loki/config/runtime-config.yml
  period: 10s
