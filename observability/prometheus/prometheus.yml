# ============================================================
# Prometheus 配置模板
# NexusLog 可观测性平台
# ============================================================
# change_level: none（无需审批）
# hot_reload: true
# reload_method: HTTP POST /-/reload 或 SIGHUP 信号
# reload_command: curl -X POST http://localhost:9090/-/reload
# 启动参数: --web.enable-lifecycle（启用 /-/reload 端点）
#           --config.file=/etc/prometheus/prometheus.yml
# 生效时间: 分钟级
# 说明: 规则文件和目标文件变更后，通过 reload 即可生效，无需重启
#       file_sd_configs 的目标文件会按 refresh_interval 自动发现
# ============================================================

# 全局配置
global:
  # 抓取间隔：每 15 秒从目标拉取一次指标
  scrape_interval: 15s
  # 评估间隔：每 15 秒评估一次告警规则
  evaluation_interval: 15s
  # 抓取超时时间
  scrape_timeout: 10s

# 告警规则文件路径
rule_files:
  - "rules/*.yml"

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # Alertmanager 服务地址
            - "alertmanager:9093"

# 抓取目标配置
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "control-plane"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["control-plane:8080"]
        labels:
          service: "control-plane"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "api-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api-service:8080"]
        labels:
          service: "api-service"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "query-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["query-api:8082"]
        labels:
          service: "query-api"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "collector-agent"
    metrics_path: "/agent/v1/metrics"
    static_configs:
      - targets: ["collector-agent:9091"]
        labels:
          service: "collector-agent"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          service: "kafka"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "elasticsearch"
    static_configs:
      - targets: ["elasticsearch-exporter:9114"]
        labels:
          service: "elasticsearch"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
        labels:
          service: "alertmanager"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "grafana"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: "grafana"
          env: "dev"
          cluster: "nexuslog-dev"

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"
          env: "dev"
          cluster: "nexuslog-dev"
