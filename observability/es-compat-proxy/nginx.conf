worker_processes 1;

events {
  worker_connections 1024;
}

http {
  server {
    listen 9200;
    client_max_body_size 100m;

    location / {
      proxy_pass http://elasticsearch:9200;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host elasticsearch:9200;
      proxy_set_header Accept "application/vnd.elasticsearch+json; compatible-with=7";
      proxy_set_header Content-Type "application/vnd.elasticsearch+json; compatible-with=7";
      proxy_buffering off;
      proxy_request_buffering off;
      chunked_transfer_encoding off;
    }
  }
}
