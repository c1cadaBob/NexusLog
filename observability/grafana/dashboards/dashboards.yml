# ============================================================
# Grafana Dashboard Provisioning 配置
# NexusLog 可观测性平台
# ============================================================

apiVersion: 1

providers:
  - name: "NexusLog"
    orgId: 1
    folder: "NexusLog"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/nexuslog
      foldersFromFilesStructure: true
