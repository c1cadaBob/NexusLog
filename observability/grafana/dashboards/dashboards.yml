# ============================================================
# Grafana Dashboard Provisioning 配置
# NexusLog 可观测性平台
# ============================================================
# change_level: none（无需审批）
# hot_reload: true
# reload_method: Grafana 按 updateIntervalSeconds 自动扫描 Dashboard 文件变更
# reload_command: curl -X POST http://localhost:3000/api/admin/provisioning/dashboards/reload
# 生效时间: 秒级（默认 30 秒扫描间隔）
# 说明: Dashboard JSON 文件新增/修改后自动加载，allowUiUpdates 允许 UI 编辑
# ============================================================

apiVersion: 1

providers:
  - name: "NexusLog"
    orgId: 1
    folder: "NexusLog"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/nexuslog
      foldersFromFilesStructure: true
