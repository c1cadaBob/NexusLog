# ============================================================
# Grafana 数据源配置（Provisioning）
# NexusLog 可观测性平台
# ============================================================

apiVersion: 1

datasources:
  # Prometheus 数据源（指标）
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # Loki 数据源（日志）
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000

  # Jaeger 数据源（链路追踪）
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger-query:16686
    editable: false

  # Elasticsearch 数据源（业务日志检索）
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    editable: false
    jsonData:
      index: "nexuslog-logs-*"
      timeField: "@timestamp"
      esVersion: "8.13.0"
      logMessageField: "message"
      logLevelField: "level"
