# ============================================================
# Grafana 数据源配置（Provisioning）
# NexusLog 可观测性平台
# ============================================================
# change_level: none（无需审批）
# hot_reload: true
# reload_method: Grafana Provisioning 自动监听文件变更，或通过 API 重载
# reload_command: curl -X POST http://localhost:3000/api/admin/provisioning/datasources/reload
# 生效时间: 秒级
# 说明: 数据源配置文件变更后 Grafana 自动检测并重载，无需重启
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: false
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: false

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    editable: false
    jsonData:
      index: "nexuslog-logs-*"
      timeField: "@timestamp"
      esVersion: "8.13.0"
      logMessageField: "message"
      logLevelField: "level"
